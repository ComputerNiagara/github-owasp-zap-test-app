# =============================================================================
# Fake Deploy to DEV — Test Workflow
# =============================================================================
# Purpose: Simulates a deployment to trigger the automatic OWASP ZAP baseline
#          scan via the deployment_status event.
#
# This is a TEST workflow — there is no real deployment here.
# Replace environment_url with your actual app URL before using in production.
# =============================================================================

name: Fake Deploy to DEV

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    steps:
      # ---------------------------------------------------------------
      # Step 1 — Create GitHub Deployment record at the start
      # ---------------------------------------------------------------
      - name: Create Deployment
        id: deployment
        uses: ComputerNiagara/github-owasp-templates/actions/create-deployment@main
        with:
          environment: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # Fake deploy step — replace with real deploy steps
      # ---------------------------------------------------------------
      - name: Deploy Application
        run: |
          echo "Simulating deployment..."
          sleep 5
          echo "Deploy complete."

      # ---------------------------------------------------------------
      # Step 2 — Report success + set URL for ZAP to scan
      # GitHub fires deployment_status event after this step
      # ZAP baseline scan triggers automatically in this repo
      # ---------------------------------------------------------------
      - name: Report Deployment Success
        if: success()
        uses: ComputerNiagara/github-owasp-templates/actions/update-deployment@main
        with:
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          environment: dev
          status: success
          environment_url: 'https://www.devopspertise.com'   # TODO: replace with your app URL
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # Step 3 — Explicitly trigger ZAP scan — TEST ONLY
      # ---------------------------------------------------------------
      # This step is a workaround for a personal GitHub.com limitation.
      # github-actions[bot] created deployments do not reliably fire the
      # deployment_status event on personal accounts, so we explicitly
      # trigger the scan via repository_dispatch instead.
      #
      # ⚠️ DO NOT copy this step into enterprise pipelines.
      # In GitHub Enterprise the deployment_status event fires correctly
      # and owasp-baseline-scan.yml triggers automatically — no dispatch
      # step needed. Remove this step before enterprise rollout.
      # ---------------------------------------------------------------
      - name: Trigger ZAP Baseline Scan
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{
              "event_type": "zap-baseline-scan",
              "client_payload": {
                "environment": "dev",
                "environment_url": "https://www.devopspertise.com"
              }
            }'
          echo "✅ ZAP baseline scan triggered"

      # ---------------------------------------------------------------
      # Step 3 — Report failure (ZAP will NOT fire)
      # ---------------------------------------------------------------
      - name: Report Deployment Failure
        if: failure()
        uses: ComputerNiagara/github-owasp-templates/actions/update-deployment@main
        with:
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          environment: dev
          status: failure
          token: ${{ secrets.GITHUB_TOKEN }}
