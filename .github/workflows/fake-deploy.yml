# =============================================================================
# Fake Deploy to DEV — Test Workflow
# =============================================================================
# Purpose: Simulates a deployment to trigger the automatic OWASP ZAP baseline
#          scan via the deployment_status event.
#
# This is a TEST workflow — there is no real deployment here.
# Replace environment_url with your actual app URL before using in production.
# =============================================================================

name: Fake Deploy to DEV

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------
  # Step 1 — Create GitHub Deployment record
  # ---------------------------------------------------------------
  create-deployment:
    name: Create Deployment
    uses: ComputerNiagara/github-owasp-templates/.github/workflows/create-deployment.yml@fix/zap-workspace-permissions
    with:
      environment: dev
    permissions:
      contents: read
      deployments: write

  # ---------------------------------------------------------------
  # Fake deploy — replace with real deploy steps
  # ---------------------------------------------------------------
  deploy:
    name: Deploy Application
    needs: create-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Simulate Deploy
        run: |
          echo "Simulating deployment..."
          sleep 5
          echo "Deploy complete."

  # ---------------------------------------------------------------
  # Step 2 — Report success + set URL for ZAP to scan
  # ---------------------------------------------------------------
  report-success:
    name: Report Success
    needs: [create-deployment, deploy]
    if: success()
    uses: ComputerNiagara/github-owasp-templates/.github/workflows/update-deployment.yml@fix/zap-workspace-permissions
    with:
      deployment_id: ${{ needs.create-deployment.outputs.deployment_id }}
      environment: dev
      status: success
      environment_url: 'https://www.devopspertise.com'   # TODO: replace with your app URL
    permissions:
      contents: read
      deployments: write

  # ---------------------------------------------------------------
  # Step 3 — Report failure (ZAP will NOT fire)
  # ---------------------------------------------------------------
  report-failure:
    name: Report Failure
    needs: [create-deployment, deploy]
    if: failure()
    uses: ComputerNiagara/github-owasp-templates/.github/workflows/update-deployment.yml@fix/zap-workspace-permissions
    with:
      deployment_id: ${{ needs.create-deployment.outputs.deployment_id }}
      environment: dev
      status: failure
    permissions:
      contents: read
      deployments: write
